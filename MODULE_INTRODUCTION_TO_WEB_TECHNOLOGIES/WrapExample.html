<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Flexbox Layout</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .card {
      flex: 1 1 200px;  /* grow, shrink, base width */
      background: lightblue;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
  </div>

</body>
</html>
